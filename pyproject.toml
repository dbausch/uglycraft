[project]
name        = "uglycraft"
version     = "1.0"
description = "A remake of UGLI (1993), a DOS maze-chase game"
authors     = [{name = "Daniel Bausch", email = "db@edv-bausch.de"}]
requires-python = ">=3.10"
dependencies    = ["pygame>=2.0", "numpy"]

[tool.poe.tasks]

[tool.poe.tasks.install]
help  = "Create venv and install all dependencies"
shell = "python3 -m venv .venv && .venv/bin/pip install pygame numpy poethepoet pyinstaller"

[tool.poe.tasks.run]
help = "Run the game"
cmd  = ".venv/bin/python main.py"

[tool.poe.tasks.run-level]
help   = "Run the game starting at a specific level (e.g. poe run-level 10)"
shell  = ".venv/bin/python main.py --level ${level}"
args   = [{name = "level", positional = true}]

[tool.poe.tasks.build-linux]
help  = "Build a standalone Linux executable (dist/uglycraft)"
cmd   = ".venv/bin/pyinstaller --onefile --noconsole --name uglycraft main.py"

[tool.poe.tasks.build-windows]
help  = "Build a standalone Windows executable via Wine (dist/uglycraft.exe)"
shell = """
  WINEDEBUG=-all wine \
    ~/.wine/drive_c/users/$USER/AppData/Local/Programs/Python/Python313/python.exe \
    -m PyInstaller --onefile --noconsole --name uglycraft main.py
"""

[tool.poe.tasks.deploy]
help     = "Build both executables and push to itch.io"
sequence = ["build-linux", "build-windows", "_push-linux", "_push-windows"]

[tool.poe.tasks._push-linux]
shell = "butler push dist/uglycraft dbausch/uglycraft:linux-64 --userversion $(git describe --tags --abbrev=0 | sed 's/^v//')"

[tool.poe.tasks._push-windows]
shell = "butler push dist/uglycraft.exe dbausch/uglycraft:windows-64 --userversion $(git describe --tags --abbrev=0 | sed 's/^v//')"
